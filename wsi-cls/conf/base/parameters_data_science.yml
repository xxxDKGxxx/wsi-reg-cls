logistic_regression_grid:
  - selectkbest__k: ['all' ]
    logisticregression__C: [ 0.01, 0.1, 1, 10, 100 ]
    logisticregression__penalty: [ 'l1' ]
    logisticregression__solver: [ 'liblinear', 'saga' ]
    logisticregression__max_iter: [ 2000 ]

  - selectkbest__k: [ 'all' ]
    logisticregression__C: [ 0.01, 0.1, 1, 10, 100 ]
    logisticregression__penalty: [ 'l2' ]
    logisticregression__solver: [ 'lbfgs', 'liblinear', 'saga' ]
    logisticregression__max_iter: [ 2000 ]

svc_grid:
  selectkbest__k: ['all' ]
  svc__C: [0.1, 1, 10]
  svc__kernel: ['poly']
  svc__degree: [2, 3]
  svc__coef0: [0.0, 1.0, 5.0]
  svc__gamma: ['scale', 'auto', 0.1, 1.0]

xgboost_grid:
  selectkbest__k: ['all']
  balancedmulticlassxgboost__model__n_estimators: [50, 100, 200]
  balancedmulticlassxgboost__model__max_depth: [3, 5, 7]
  balancedmulticlassxgboost__model__learning_rate: [0.01, 0.1, 0.2, 0.3]
  balancedmulticlassxgboost__model__subsample: [0.8, 1.0]
  balancedmulticlassxgboost__model__colsample_bytree: [0.8, 1.0]
  balancedmulticlassxgboost__model__gamma: [0, 0.1, 1.0]